<!DOCTYPE html>
<html>
<body>

<script>
let nombre = prompt("Nombre").toLowerCase();
nombre = nombre.charAt(0).toUpperCase() + nombre.slice(1);

let plan = parseInt(prompt("Plan"));

let gigas;
let precio;

switch(plan){
    case 1:
        gigas = "2 GB";
        precio = 25000;
        break;
    case 2:
        gigas = "5 GB";
        precio = 45000;
        break;
    case 3:
        gigas = "10 GB";
        precio = 75000;
        break;
    default:
        alert("Plan no disponible");
}

if(precio){
    document.write(`Cliente: ${nombre}<br>`);
    document.write(`Plan: ${plan}<br>`);
    document.write(`Gigas: ${gigas}<br>`);
    document.write(`Precio: $${precio.toLocaleString("es-CO")}`);
}
</script>

</body>
</html>
