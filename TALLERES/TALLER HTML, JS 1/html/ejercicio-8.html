<!DOCTYPE html>
<html>
<body>

<script>
let producto = prompt("Producto");
let precio = parseFloat(prompt("Precio"));
let descuento = parseFloat(prompt("Descuento"));

if(descuento < 1 || descuento > 70){
    alert("Porcentaje no válido, debe estar entre 1% y 70%");
}else{
    let valorDescuento = precio * (descuento / 100);
    let precioFinal = precio - valorDescuento;

    let mensaje = descuento > 50
        ? "¡Oferta especial!"
        : "Precio de temporada";

    document.write(`Producto: ${producto}<br>`);
    document.write(`Precio: $${precio.toLocaleString("es-CO")}<br>`);
    document.write(`Descuento: $${valorDescuento.toLocaleString("es-CO")}<br>`);
    document.write(`Final: $${precioFinal.toLocaleString("es-CO")}<br>`);
    document.write(mensaje);
}
</script>

</body>
</html>
